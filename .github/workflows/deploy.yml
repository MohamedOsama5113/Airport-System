name: Deploy to GitHub Pages

on:
  push:
    branches: [ main ]

jobs:
  build:
    runs-on: ubuntu-latest

    permissions:
      contents: read
      pages: write
      id-token: write

    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}

    steps:
    - name: Checkout repository
      uses: actions/checkout@v4

    - name: Setup Node.js 18
      uses: actions/setup-node@v4
      with:
        node-version: '18'
        cache: 'npm'

    - name: Install dependencies
      # Removed --force to prevent npm from skipping optional platform dependencies
      run: npm install --legacy-peer-deps

    - name: Fix Rollup Linux binary issue
      # Explicitly injects the missing Linux package required by Vite/Rollup on Ubuntu
      run: npm install @rollup/rollup-linux-x64-gnu --no-save

    - name: Build project
      run: npm run build

    - name: Upload artifact
      uses: actions/upload-pages-artifact@v3
      with:
        # Changed from './build' to './dist' because Vite outputs to 'dist' by default
        path: './dist'

    - name: Deploy to GitHub Pages
      id: deployment
      uses: actions/deploy-pages@v4